<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Engagement Memories | ISHAN Stream</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600&family=Syne:wght@700;800&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #080706;
            --gold: #c9a96e;
            --cream: #f0e8d8;
            --text: #ede8e0;
            --muted: #7a7269;
            --border: rgba(201,169,110,0.2);
            --transition: all 0.6s cubic-bezier(0.23, 1, 0.32, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; overflow-x: hidden; }

        /* Cinematic Header */
        header { height: 60vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 40px; background: radial-gradient(circle at center, #1a1815 0%, #080706 100%); }
        .wordmark { font-family: 'Syne', sans-serif; font-size: clamp(3rem, 15vw, 8rem); text-transform: uppercase; letter-spacing: 0.1em; color: var(--cream); }
        .wordmark span { color: var(--gold); }
        .hero-title { font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 1.5rem; color: var(--muted); margin-top: -10px; }

        /* The Grid */
        .main-container { max-width: 1300px; margin: -100px auto 100px; padding: 0 20px; }
        .video-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 30px; }

        /* Video Card Customization */
        .video-card {
            position: relative;
            background: #111;
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid var(--border);
            transition: var(--transition);
            z-index: 1;
        }

        /* Expansion Effect */
        .video-card.active {
            transform: scale(1.05);
            z-index: 10;
            box-shadow: 0 30px 60px rgba(0,0,0,0.8), 0 0 20px rgba(201,169,110,0.1);
        }

        .video-wrapper {
            position: relative;
            width: 100%;
            aspect-ratio: 16/9;
            background: #000;
        }

        /* Drive Iframe Styling */
        .video-wrapper iframe {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            border: none;
            opacity: 0; /* Initially hidden */
            transition: opacity 0.5s ease;
        }

        /* Dropbox Thumbnail Poster */
        .poster {
            position: absolute;
            inset: 0;
            background-size: cover;
            background-position: center;
            z-index: 3;
            transition: opacity 0.5s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .video-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
            z-index: 4;
        }

        /* Gold Play Button */
        .play-btn {
            position: relative;
            width: 70px; height: 70px;
            border-radius: 50%;
            background: rgba(8, 7, 6, 0.6);
            border: 1px solid var(--gold);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 5;
            cursor: pointer;
            transition: var(--transition);
            backdrop-filter: blur(5px);
        }

        .play-btn svg { fill: var(--gold); margin-left: 4px; }
        .video-card:hover .play-btn { transform: scale(1.1); background: var(--gold); }
        .video-card:hover .play-btn svg { fill: #000; }

        /* Card Info */
        .video-info { padding: 25px; position: relative; z-index: 5; pointer-events: none; }
        .video-num { font-family: 'Cormorant Garamond', serif; font-style: italic; color: var(--gold); font-size: 0.9rem; }
        .video-title { font-family: 'Cormorant Garamond', serif; font-size: 1.6rem; color: var(--cream); margin-top: 5px; }

        /* State: Playing */
        .video-card.playing iframe { opacity: 1; }
        .video-card.playing .poster, 
        .video-card.playing .play-btn, 
        .video-card.playing .video-overlay { opacity: 0; pointer-events: none; }

        @media (max-width: 768px) {
            .video-grid { grid-template-columns: 1fr; }
            header { height: 50vh; }
        }
    </style>
</head>
<body>

    <header>
        <div class="wordmark">ISHAN <span>STREAM</span></div>
        <p class="hero-title">Engagement Memories &bull; 2026</p>
    </header>

    <main class="main-container">
        <div class="video-grid">
            
            <div class="video-card" onclick="playVideo(this)">
                <div class="video-wrapper">
                    <div class="poster" style="background-image: url('THUMBNAIL_1_DROPBOX_LINK?raw=1');">
                        <div class="video-overlay"></div>
                        <div class="play-btn">
                            <svg width="24" height="24" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                        </div>
                    </div>
                    <iframe src="https://drive.google.com/file/d/DRIVE_ID_1/preview"></iframe>
                </div>
                <div class="video-info">
                    <div class="video-num">Chapter I</div>
                    <h3 class="video-title">Roots & Relations: The Family Montage</h3>
                </div>
            </div>

            <div class="video-card" onclick="playVideo(this)">
                <div class="video-wrapper">
                    <div class="poster" style="background-image: url('THUMBNAIL_2_DROPBOX_LINK?raw=1');">
                        <div class="video-overlay"></div>
                        <div class="play-btn">
                            <svg width="24" height="24" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                        </div>
                    </div>
                    <iframe src="https://drive.google.com/file/d/DRIVE_ID_2/preview"></iframe>
                </div>
                <div class="video-info">
                    <div class="video-num">Chapter II</div>
                    <h3 class="video-title">Eternal Gaze: Cinematic Verse I</h3>
                </div>
            </div>

            <div class="video-card" onclick="playVideo(this)">
                <div class="video-wrapper">
                    <div class="poster" style="background-image: url('THUMBNAIL_3_DROPBOX_LINK?raw=1');">
                        <div class="video-overlay"></div>
                        <div class="play-btn">
                            <svg width="24" height="24" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                        </div>
                    </div>
                    <iframe src="https://drive.google.com/file/d/1LD2ASoqB7yCvZN75O2MihStWBuyRLHEu/preview"></iframe>
                </div>
                <div class="video-info">
                    <div class="video-num">Chapter III</div>
                    <h3 class="video-title">The Sacred Promise: Roka Ceremony</h3>
                </div>
            </div>

            <div class="video-card" onclick="playVideo(this)">
                <div class="video-wrapper">
                    <div class="poster" style="background-image: url('THUMBNAIL_4_DROPBOX_LINK?raw=1');">
                        <div class="video-overlay"></div>
                        <div class="play-btn">
                            <svg width="24" height="24" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                        </div>
                    </div>
                    <iframe src="https://drive.google.com/file/d/DRIVE_ID_4/preview"></iframe>
                </div>
                <div class="video-info">
                    <div class="video-num">Chapter IV</div>
                    <h3 class="video-title">Hand in Hand: Cinematic Verse II</h3>
                </div>
            </div>

            <div class="video-card" style="grid-column: span 2;" onclick="playVideo(this)">
                <div class="video-wrapper">
                    <div class="poster" style="background-image: url('THUMBNAIL_5_DROPBOX_LINK?raw=1');">
                        <div class="video-overlay"></div>
                        <div class="play-btn">
                            <svg width="24" height="24" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                        </div>
                    </div>
                    <iframe src="https://drive.google.com/file/d/1kM4m_ojMCPlPjCEgsOZT6nSdQbBHjnRf/preview"></iframe>
                </div>
                <div class="video-info">
                    <div class="video-num">Chapter V</div>
                    <h3 class="video-title">Sealed with a Ring: The Engagement</h3>
                </div>
            </div>

        </div>
    </main>

    <script>
        function playVideo(card) {
            // Remove active and playing class from all other cards
            document.querySelectorAll('.video-card').forEach(c => {
                if(c !== card) {
                    c.classList.remove('active');
                    c.classList.remove('playing');
                }
            });

            // Toggle active and playing for clicked card
            card.classList.add('active');
            card.classList.add('playing');
        }
    </script>

</body>
</html>
